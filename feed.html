<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>펜싱 피드 — 메종드펜싱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F2EC; --paper: #FDFBF7; --ink: #1C1A17;
    --muted: #6B6760; --faint: #E8E4DC; --border: rgba(28,26,23,0.1);
    --border-strong: rgba(28,26,23,0.2);
    --red: #C0392B; --red-bg: #FAF0EE;
    --teal: #1A6B5A; --teal-bg: #E8F4F0;
    --blue: #1A4A7A; --blue-bg: #EAF0F8;
    --youtube: #FF0000; --reddit: #FF4500;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Noto Sans KR', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--cream); color: var(--ink); font-size: 14px; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; }

  /* Nav */
  .nav { background: var(--paper); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .nav-inner { max-width: 1200px; margin: 0 auto; padding: 0 32px; height: 56px; display: flex; align-items: center; }
  .nav-logo { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: 2px; margin-right: 36px; white-space: nowrap; }
  .nav-logo em { color: var(--red); font-style: normal; }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-links a { font-size: 13px; color: var(--muted); padding: 5px 11px; border-radius: 6px; transition: all .15s; }
  .nav-links a:hover { background: var(--cream); color: var(--ink); }
  .nav-links a.active { background: var(--cream); color: var(--ink); font-weight: 500; }
  .nav-auth { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn-sm { font-size: 13px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-strong); background: transparent; color: var(--muted); transition: all .15s; }
  .btn-sm:hover { background: var(--cream); color: var(--ink); }
  .btn-sm.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  /* Header */
  .page-header { background: var(--ink); padding: 32px 32px 28px; }
  .page-header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; }
  .page-header h1 { font-family: var(--font-display); font-size: 36px; font-weight: 400; letter-spacing: 2px; color: var(--cream); }
  .page-header p { font-size: 12px; color: rgba(245,242,236,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }
  .btn-upload { display: flex; align-items: center; gap: 6px; padding: 10px 20px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .btn-upload:hover { opacity: .85; }

  /* Filter bar */
  .filter-bar { background: var(--paper); border-bottom: 1px solid var(--border); padding: 12px 32px; }
  .filter-bar-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .chip { font-size: 12px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border-strong); color: var(--muted); cursor: pointer; transition: all .15s; background: transparent; display: flex; align-items: center; gap: 5px; }
  .chip:hover { border-color: var(--ink); color: var(--ink); }
  .chip.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }
  .chip-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-reddit { background: var(--reddit); }
  .dot-user { background: var(--teal); }
  .divider-v { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .sort-chip { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); cursor: pointer; background: transparent; transition: all .15s; }
  .sort-chip.active { background: var(--faint); color: var(--ink); border-color: var(--border-strong); }

  /* Masonry */
  .grid-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }
  .masonry { columns: 4; column-gap: 14px; }
  @media (max-width: 1100px) { .masonry { columns: 3; } }
  @media (max-width: 750px)  { .masonry { columns: 2; } }

  .card { break-inside: avoid; margin-bottom: 14px; background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color .15s, transform .15s; }
  .card:hover { border-color: var(--border-strong); transform: translateY(-2px); }
  .card-link { display: block; text-decoration: none; color: inherit; }

  .thumb { width: 100%; background: var(--faint); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .thumb img { width: 100%; display: block; object-fit: cover; }
  .thumb video { width: 100%; display: block; max-height: 280px; object-fit: cover; }
  .thumb-placeholder { width: 100%; padding: 32px 20px; display: flex; align-items: center; justify-content: center; font-size: 52px; min-height: 160px; background: var(--faint); }

  .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(28,26,23,0.25); opacity: 0; transition: opacity .2s; }
  .card:hover .play-overlay { opacity: 1; }
  .play-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; }
  .play-btn svg { margin-left: 3px; }

  .source-badge { position: absolute; top: 8px; left: 8px; font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 4px; }
  .badge-reddit  { background: rgba(255,69,0,0.85); color: #fff; }
  .badge-youtube { background: rgba(255,0,0,0.85); color: #fff; }
  .badge-user    { background: rgba(26,107,90,0.9); color: #fff; }
  .badge-instagram { background: linear-gradient(135deg,#833ab4,#fd1d1d); color: #fff; }

  .card-body { padding: 10px 12px 10px; }
  .card-title { font-size: 13px; font-weight: 500; line-height: 1.4; color: var(--ink); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; font-size: 11px; color: var(--muted); }
  .card-author { display: flex; align-items: center; gap: 4px; }
  .card-actions { display: flex; align-items: center; gap: 8px; }
  .like-btn { display: flex; align-items: center; gap: 3px; background: none; border: none; font-size: 11px; color: var(--muted); padding: 2px 4px; border-radius: 4px; transition: all .15s; }
  .like-btn:hover, .like-btn.liked { color: var(--red); }
  .del-btn { background: none; border: none; font-size: 11px; color: var(--muted); padding: 2px 4px; border-radius: 4px; transition: color .15s; }
  .del-btn:hover { color: var(--red); }

  .feed-status { text-align: center; padding: 20px; font-size: 13px; color: var(--muted); }
  .load-more-btn { display: none; margin: 0 auto 32px; padding: 10px 32px; border: 1px solid var(--border-strong); border-radius: 8px; background: var(--paper); color: var(--muted); font-size: 13px; transition: all .15s; }
  .load-more-btn:hover { background: var(--ink); color: var(--cream); border-color: var(--ink); }

  /* ── Upload Modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(28,26,23,0.55); z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--paper); border-radius: 16px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; }
  .modal-header h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: 1px; }
  .modal-close { background: none; border: none; font-size: 22px; color: var(--muted); line-height: 1; }
  .modal-body { padding: 20px 24px 24px; }

  /* Type tabs */
  .type-tabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .type-tab { flex: 1; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: transparent; font-size: 12px; color: var(--muted); cursor: pointer; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 4px; font-family: var(--font-body); }
  .type-tab:hover { border-color: var(--border-strong); color: var(--ink); }
  .type-tab.active { background: var(--ink); border-color: var(--ink); color: var(--cream); }
  .type-tab svg { opacity: .7; }
  .type-tab.active svg { opacity: 1; }

  /* Drop zone */
  .drop-zone { border: 2px dashed var(--border-strong); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all .15s; position: relative; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--ink); background: var(--faint); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-zone p { font-size: 13px; color: var(--muted); margin-top: 8px; }
  .drop-zone strong { font-size: 14px; color: var(--ink); }
  .preview-wrap { margin-top: 12px; border-radius: 8px; overflow: hidden; display: none; }
  .preview-wrap img, .preview-wrap video { width: 100%; max-height: 200px; object-fit: cover; display: block; }

  /* Link input */
  .link-input-wrap { display: none; }
  .link-input-wrap input { width: 100%; padding: 11px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 14px; color: var(--ink); background: var(--cream); outline: none; transition: border-color .15s; font-family: var(--font-body); }
  .link-input-wrap input:focus { border-color: var(--ink); }
  .link-preview { margin-top: 10px; display: none; background: var(--faint); border-radius: 8px; overflow: hidden; }
  .link-preview img { width: 100%; max-height: 160px; object-fit: cover; }
  .link-preview-info { padding: 8px 12px; font-size: 12px; color: var(--muted); }

  /* Title input */
  .form-group { margin-top: 14px; }
  .form-group label { font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: .5px; display: block; margin-bottom: 5px; }
  .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 14px; color: var(--ink); background: var(--cream); outline: none; transition: border-color .15s; font-family: var(--font-body); }
  .form-group input:focus { border-color: var(--ink); }

  .upload-progress { margin-top: 10px; height: 4px; background: var(--faint); border-radius: 2px; overflow: hidden; display: none; }
  .upload-progress-bar { height: 100%; background: var(--teal); border-radius: 2px; transition: width .3s; width: 0%; }
  .error-msg { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  .error-msg.show { display: block; }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .cancel-btn { flex: 1; padding: 10px; border: 1px solid var(--border-strong); border-radius: 8px; background: transparent; color: var(--muted); font-size: 13px; transition: all .15s; }
  .cancel-btn:hover { background: var(--faint); }
  .submit-btn { flex: 2; padding: 10px; background: var(--ink); color: var(--cream); border: none; border-radius: 8px; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .submit-btn:hover { opacity: .85; }
  .submit-btn:disabled { opacity: .4; cursor: default; }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); font-size: 13px; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">MAISON <em>de</em> FENCING</a>
    <div class="nav-links">

<div class="page-header">
  <div class="page-header-inner">
    <div>
      <h1>펜싱 피드</h1>

    </button>

</div>

<div class="filter-bar">
  <div class="filter-bar-inner">
    <span class="filter-label">소스</span>
    <button class="chip active" id="chip-all" onclick="setFilter('all')">전체</button>
    <button class="chip" id="chip-reddit" onclick="setFilter('reddit')">
      <span class="chip-dot dot-reddit"></span> Reddit

    <button class="chip" id="chip-youtube" onclick="setFilter('youtube')">
      <span class="chip-dot" style="background:var(--youtube)"></span> YouTube

    <button class="chip" id="chip-user" onclick="setFilter('user')">
      <span class="chip-dot dot-user"></span> 회원 업로드
    </button>
    <div class="divider-v"></div>
    <span class="filter-label">정렬</span>

    <button class="sort-chip" id="sort-top" onclick="setSort('top')">인기순</button>
  </div>
</div>

<div class="grid-wrap">
  <div id="masonry" class="masonry"></div>
  <div id="feed-status" class="feed-status">피드 로딩 중...</div>
  <button class="load-more-btn" id="load-more" onclick="loadMore()">더 불러오기</button>
</div>

<!-- 업로드 모달 -->
<div class="modal-overlay" id="upload-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>밈 올리기</h2>

    <div class="modal-body">
      <!-- 타입 선택 -->

        <button class="type-tab active" id="tab-image" onclick="setUploadType('image')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>

        </button>
        <button class="type-tab" id="tab-video" onclick="setUploadType('video')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
          영상
        </button>
        <button class="type-tab" id="tab-instagram" onclick="setUploadType('instagram')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor"/></svg>
          인스타
        </button>
        <button class="type-tab" id="tab-youtube" onclick="setUploadType('youtube')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46a2.78 2.78 0 0 0-1.95 1.96A29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20.06 12 20.06 12 20.06s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/></svg>
          YouTube
        </button>
        <button class="type-tab" id="tab-reddit" onclick="setUploadType('reddit')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          Reddit
        </button>
      </div>

      <!-- 파일 업로드 -->
      <div id="file-upload-area">
        <div class="drop-zone" id="drop-zone">
          <input type="file" id="file-input" accept="image/*">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.3;margin-bottom:8px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <strong>클릭하거나 파일을 드래그해서 올려주세요</strong>
          <p id="file-hint">JPG, PNG, GIF, WebP · 최대 10MB</p>
        </div>
        <div class="preview-wrap" id="preview-wrap">
          <img id="preview-img" src="" alt="" style="display:none">
          <video id="preview-video" controls style="display:none"></video>
        </div>
      </div>

      <!-- 링크 입력 -->
      <div class="link-input-wrap" id="link-input-area">

          <img id="link-thumb" src="" alt="">
          <div class="link-preview-info" id="link-preview-info"></div>
        </div>
        <!-- 인스타 전용: 썸네일 이미지 업로드 -->
        <div id="insta-thumb-area" style="display:none;margin-top:10px">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:500">📷 썸네일 이미지 (선택) — 없으면 인스타 로고로 표시</div>
          <label style="display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px dashed var(--border-strong);border-radius:7px;cursor:pointer;font-size:13px;color:var(--muted)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            <span id="insta-thumb-label">이미지 선택...</span>
            <input type="file" id="insta-thumb-input" accept="image/*" style="display:none" onchange="handleInstaThumb(this)">
          </label>
          <div id="insta-thumb-preview" style="margin-top:8px;display:none;border-radius:7px;overflow:hidden">
            <img id="insta-thumb-img" style="width:100%;max-height:140px;object-fit:cover;display:block">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>제목 / 한 줄 설명</label>
        <input type="text" id="upload-title" placeholder="어떤 내용인가요?" maxlength="100">
      </div>

      <div class="upload-progress" id="upload-progress">
        <div class="upload-progress-bar" id="upload-progress-bar"></div>
      </div>
      <div class="error-msg" id="upload-error"></div>

      <div class="modal-actions">
        <button class="cancel-btn" onclick="closeUpload()">취소</button>
        <button class="submit-btn" id="submit-btn" onclick="submitUpload()">올리기</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Supabase ── */
const SUPABASE_URL = 'https://ldqpimpauuqgxrqteswy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AtP1YZ-SG-VJ8dSYQnOHww_1z3cZxrw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ── 상태 ── */
let currentUser = null;
let currentProfile = null;
let allItems = [];
let filteredItems = [];
let currentFilter = 'all';
let currentSort = 'new';
let displayCount = 24;
let uploadType = 'image';
let selectedFile = null;
let linkThumbUrl = '';
let instaThumbFile = null;

function handleInstaThumb(input) {
  const file = input.files[0];
  if (!file) return;
  instaThumbFile = file;
  document.getElementById('insta-thumb-label').textContent = file.name;
  const preview = document.getElementById('insta-thumb-preview');
  const img = document.getElementById('insta-thumb-img');
  img.src = URL.createObjectURL(file);
  preview.style.display = '';
}

/* ── 유틸 ── */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(d) {
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60) return '방금 전';
  if (diff < 3600) return Math.floor(diff/60) + '분 전';
  if (diff < 86400) return Math.floor(diff/3600) + '시간 전';
  if (diff < 604800) return Math.floor(diff/86400) + '일 전';
  return new Date(d).toLocaleDateString('ko-KR');
}
function formatCount(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : String(n||0); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function getYouTubeId(url) {
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}
function getRedditId(url) {
  const m = url.match(/reddit\.com\/r\/\w+\/comments\/(\w+)/);
  return m ? m[1] : null;
}

async function resolveChannelId(handle) {
  try {
    const encoded = encodeURIComponent(handle);
    const url = `https://www.googleapis.com/youtube/v3/channels?part=id,snippet&forHandle=${encoded}&key=${YT_API_KEY}`;
    const res = await fetch(url);
    if (!res.ok) return null;
    const data = await res.json();
    return data.items?.[0]?.id || null;
  } catch(e) {
    console.warn(`채널 해석 실패: ${handle}`, e);
    return null;
  }
}

async function loadYouTube() {
  // 캐시에서 채널 ID 로드
  let idCache = {};
  try { idCache = JSON.parse(localStorage.getItem(YT_ID_CACHE_KEY) || '{}'); } catch(e) {}

  const items = [];
  for (const ch of YT_HANDLES) {
    try {
      // 채널 ID 없으면 API로 조회
      if (!idCache[ch.handle]) {
        const id = await resolveChannelId(ch.handle);
        if (id) { idCache[ch.handle] = id; }
        else { console.warn(`채널 ID 없음: @${ch.handle}`); continue; }
      }
      const channelId = idCache[ch.handle];
      if (!channelId) continue;

      // 최신 영상 가져오기
      const url = `https://www.googleapis.com/youtube/v3/search?channelId=${channelId}&part=snippet&order=date&maxResults=6&type=video&key=${YT_API_KEY}`;
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();

      (data.items || []).forEach(item => {
        items.push({
          id: 'yt-' + item.id.videoId,
          source: 'youtube',
          type: 'youtube',
          title: item.snippet.title,
          thumbnail: item.snippet.thumbnails?.medium?.url || item.snippet.thumbnails?.default?.url || '',
          url: `https://www.youtube.com/watch?v=${item.id.videoId}`,
          author: ch.name,
          likes: null,
          date: item.snippet.publishedAt,
        });
      });
    } catch(e) {
      console.warn(`YouTube ${ch.handle} 로드 실패:`, e);
    }
  }

  // 캐시 저장
  try { localStorage.setItem(YT_ID_CACHE_KEY, JSON.stringify(idCache)); } catch(e) {}

  allItems = allItems.filter(i => !i.id.startsWith('yt-'));
  allItems.push(...items);
  console.log(`YouTube: ${items.length}개 영상 로드됨`);
}

async function loadReddit() {
  try {
    const sort = currentSort === 'top' ? 'top' : 'new';
    const res = await fetch(`https://www.reddit.com/r/fencing/${sort}.json?limit=40&t=month`);
    if (!res.ok) throw new Error('Reddit API ' + res.status);
    const data = await res.json();
    const posts = data.data.children.map(c => c.data)
      .filter(p => !p.stickied && (
        p.post_hint === 'image' ||
        p.url?.match(/\.(jpg|jpeg|png|gif|webp)$/i) ||
        p.preview?.images?.length > 0
      ));
    const items = posts.map(p => ({
      id: 'reddit-' + p.id,
      source: 'reddit',
      type: 'image',
      title: p.title,
      thumbnail: p.preview?.images?.[0]?.resolutions?.[1]?.url?.replace(/&amp;/g,'&')
              || p.preview?.images?.[0]?.source?.url?.replace(/&amp;/g,'&') || '',
      url: 'https://reddit.com' + p.permalink,
      author: 'r/fencing',
      likes: p.score,
      date: new Date(p.created_utc * 1000).toISOString(),
    }));
    allItems = allItems.filter(i => !i.id.startsWith('reddit-'));
    allItems.push(...items);
    console.log(`Reddit: ${items.length}개 로드됨`);
  } catch(e) { console.warn('Reddit load failed:', e); }
}

async function loadUserMemes() {
  try {
    const { data: memes } = await sb.from('memes')
      .select('id, type, title, file_url, link_url, thumbnail_url, likes, created_at, author_id')
      .order('created_at', { ascending: false })

    const items = memes.map(m => ({
      id: 'user-' + m.id,
      dbId: m.id,
      source: 'user',
      type: m.type,
      title: m.title,
      thumbnail: m.thumbnail_url || m.file_url || '',
      fileUrl: m.file_url || '',
      linkUrl: m.link_url || '',
      url: m.link_url || m.file_url || '#',

function applyFilterSort() {
  let items = [...allItems];
  if (currentFilter === 'reddit')  items = items.filter(i => i.source === 'reddit');
  if (currentFilter === 'youtube') items = items.filter(i => i.source === 'youtube');
  if (currentFilter === 'user')    items = items.filter(i => i.source === 'user');
  if (currentSort === 'top') items.sort((a,b) => (b.likes||0) - (a.likes||0));
  else items.sort((a,b) => new Date(b.date) - new Date(a.date));
  filteredItems = items;
  displayCount = 24;
  renderGrid();
}

/* ── 좋아요 (user memes) ── */
async function toggleMemeLike(memeId, btn) {
  if (!currentUser) { showToast('로그인 후 좋아요를 누를 수 있어요'); return; }
  const isLiked = btn.classList.contains('liked');
  const item = allItems.find(i => i.dbId == memeId);
  if (!item) return;
  if (isLiked) {
    await sb.from('meme_likes').delete().eq('user_id', currentUser.id).eq('meme_id', memeId);
    await sb.from('memes').update({ likes: Math.max(0, item.likes - 1) }).eq('id', memeId);
    item.likes = Math.max(0, item.likes - 1);
  } else {
    await sb.from('meme_likes').insert({ user_id: currentUser.id, meme_id: memeId });
    await sb.from('memes').update({ likes: item.likes + 1 }).eq('id', memeId);
    item.likes++;
  }
  btn.classList.toggle('liked');
  btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="${!isLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg> ${formatCount(item.likes)}`;
}

async function deleteMeme(memeId) {
  if (!confirm('삭제할까요?')) return;
  const item = allItems.find(i => i.dbId == memeId);
  if (item?.fileUrl) {
    const path = item.fileUrl.split('/meme-uploads/')[1];
    if (path) await sb.storage.from('meme-uploads').remove([path]);
  }
  await sb.from('memes').delete().eq('id', memeId);
  allItems = allItems.filter(i => i.dbId != memeId);
  applyFilterSort();
  showToast('삭제됐어요');
}

  if (type === 'video') { fileInput.accept = 'video/*'; hint.textContent = 'MP4, MOV, WebM · 최대 50MB'; }

    instagram: 'https://www.instagram.com/p/...',
    youtube:   'https://www.youtube.com/watch?v=...',

// 파일 선택
document.addEventListener('DOMContentLoaded', () => {
  const fileInput = document.getElementById('file-input');
  const dropZone = document.getElementById('drop-zone');

  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
});

function handleFile(file) {
  if (!file) return;
  const maxSize = uploadType === 'video' ? 50*1024*1024 : 10*1024*1024;
  if (file.size > maxSize) { showError(`파일이 너무 커요 (최대 ${uploadType === 'video' ? '50' : '10'}MB)`); return; }
  selectedFile = file;
  const wrap = document.getElementById('preview-wrap');
  const img = document.getElementById('preview-img');
  const vid = document.getElementById('preview-video');
  wrap.style.display = '';
  if (file.type.startsWith('image/')) {
    img.src = URL.createObjectURL(file); img.style.display = ''; vid.style.display = 'none';
  } else {
    vid.src = URL.createObjectURL(file); vid.style.display = ''; img.style.display = 'none';
  }
  // 제목은 비워두고 사용자가 직접 입력하게 함
}

// 링크 입력
async function onLinkInput() {
  const url = document.getElementById('link-input').value.trim();
  const preview = document.getElementById('link-preview');
  const thumb = document.getElementById('link-thumb');
  const info = document.getElementById('link-preview-info');
  linkThumbUrl = '';

  if (uploadType === 'youtube') {
    const id = getYouTubeId(url);
    if (id) {
      linkThumbUrl = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
      thumb.src = linkThumbUrl;
      info.textContent = 'YouTube 영상';
      preview.style.display = '';
      if (!document.getElementById('upload-title').value) {
        document.getElementById('upload-title').value = 'YouTube 영상';
      }
    } else { preview.style.display = 'none'; }
  } else if (uploadType === 'reddit') {
    const id = getRedditId(url);
    if (id) {
      try {
        const res = await fetch(`https://www.reddit.com/${id}.json`);
        const data = await res.json();
        const post = data[0]?.data?.children?.[0]?.data;
        if (post) {
          const t = post.preview?.images?.[0]?.source?.url?.replace(/&amp;/g,'&') || '';
          if (t) { linkThumbUrl = t; thumb.src = t; preview.style.display = ''; }
          info.textContent = 'r/' + (post.subreddit || 'fencing');
          if (!document.getElementById('upload-title').value) {
            document.getElementById('upload-title').value = post.title?.slice(0,80) || '';
          }
        }
      } catch(e) { preview.style.display = 'none'; }
    } else { preview.style.display = 'none'; }
  } else if (uploadType === 'instagram') {
    if (url.includes('instagram.com')) {
      try {
        const res = await fetch(`https://api.instagram.com/oembed/?url=${encodeURIComponent(url)}&format=json`);
        if (res.ok) {
          const data = await res.json();
          if (data.thumbnail_url) { linkThumbUrl = data.thumbnail_url; thumb.src = linkThumbUrl; preview.style.display = ''; }
          info.textContent = data.author_name ? `@${data.author_name}` : 'Instagram';
          if (!document.getElementById('upload-title').value && data.title)
            document.getElementById('upload-title').value = data.title.slice(0,80);
        } else {
          info.textContent = 'Instagram 게시물'; preview.style.display = 'none';
          if (!document.getElementById('upload-title').value)
            document.getElementById('upload-title').value = 'Instagram 게시물';
        }
      } catch(e) { info.textContent = 'Instagram 게시물'; preview.style.display = 'none'; }
    } else { preview.style.display = 'none'; }
  }
}

  if (!title) { showError('제목을 입력해주세요'); return; }

  const isFile = uploadType === 'image' || uploadType === 'video';
  if (isFile && !selectedFile) { showError('파일을 선택해주세요'); return; }
  if (!isFile && !link) { showError('링크를 입력해주세요'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '업로드 중...';
  setProgress(10);

  try {
    let fileUrl = null, thumbnailUrl = linkThumbUrl || null;

    if (isFile && selectedFile) {
      const ext = selectedFile.name.split('.').pop().toLowerCase();
      const path = `${currentUser.id}/${Date.now()}.${ext}`;
      setProgress(30);
      const { data: uploadData, error: uploadError } = await sb.storage
        .from('meme-uploads')
        .upload(path, selectedFile, { upsert: false, contentType: selectedFile.type });
      if (uploadError) {
        if (uploadError.message?.includes('bucket') || uploadError.message?.includes('not found')) {
          throw new Error('Storage 버킷이 없어요. Supabase → Storage → meme-uploads 버킷을 Public으로 만들어주세요.');
        }
        throw uploadError;
      }
      setProgress(70);
      const { data: { publicUrl } } = sb.storage.from('meme-uploads').getPublicUrl(path);
      fileUrl = publicUrl;
      if (uploadType === 'image') thumbnailUrl = publicUrl;
    // 제목은 자동입력 안 함 - 사용자가 직접 입력
    }

    // 인스타 썸네일 이미지 별도 업로드
    if (uploadType === 'instagram' && instaThumbFile) {
      setProgress(40);
      const ext = instaThumbFile.name.split('.').pop().toLowerCase();
      const path = `${currentUser.id}/thumb_${Date.now()}.${ext}`;
      const { error: thumbErr } = await sb.storage.from('meme-uploads').upload(path, instaThumbFile, { upsert: false, contentType: instaThumbFile.type });
      if (!thumbErr) {
        const { data: { publicUrl } } = sb.storage.from('meme-uploads').getPublicUrl(path);
        thumbnailUrl = publicUrl;
      }
      setProgress(70);
    }

    setProgress(85);
    console.log('memes insert 시작:', { type: uploadType, title, link_url: isFile ? null : link, thumbnail_url: thumbnailUrl });
    const { error: insertError } = await sb.from('memes').insert({
      author_id: currentUser.id,
      type: uploadType,
      title,
      file_url: fileUrl,
      link_url: isFile ? null : link,
      thumbnail_url: thumbnailUrl,
    });
    if (insertError) {
      console.error('insert 오류:', insertError);
      if (insertError.message?.includes('memes_type_check')) {
        throw new Error('타입 제약 오류 — SQL에서 constraint 재설정 필요');
      }
      if (insertError.message?.includes('row-level security')) {
        throw new Error('권한 오류 (RLS) — Supabase 정책을 확인해주세요');
      }
      throw insertError;
    }
    console.log('insert 성공!');

    setProgress(100);
    setTimeout(async () => {
      try {
        closeUpload();
        showToast('업로드됐어요! 🎉');
        allItems = allItems.filter(i => !i.id.startsWith('user-'));
        await loadUserMemes();
        applyFilterSort();
      } catch(innerErr) {
        console.error('업로드 후 오류:', innerErr);
        closeUpload();
        showToast('업로드됐어요! (피드 새로고침 필요)');
      }
    }, 400);
  } catch(e) {
    console.error('업로드 오류:', e);
    const msg = e.message || '알 수 없는 오류';
    showError('업로드 실패: ' + msg);
    btn.disabled = false;
    btn.textContent = '올리기';
    setProgress(0);
  }
}

function setProgress(v) {
  document.getElementById('upload-progress').style.display = v > 0 ? '' : 'none';
  document.getElementById('upload-progress-bar').style.width = v + '%';
}
function showError(msg) {
  const el = document.getElementById('upload-error');
  el.textContent = msg; el.classList.add('show');
}

/* ── Init ── */
async function init() {
  await initAuth();
  await loadAll();
}
init();
</script>
</body>
</html>
