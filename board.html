<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F2EC; --paper: #FDFBF7; --ink: #1C1A17;
    --muted: #6B6760; --faint: #E8E4DC;
    --border: rgba(28,26,23,0.1); --border-strong: rgba(28,26,23,0.2);
    --red: #C0392B; --red-bg: #FAF0EE;
    --teal: #1A6B5A; --teal-bg: #E8F4F0;
    --blue: #1A4A7A; --blue-bg: #EAF0F8;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Noto Sans KR', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--cream); color: var(--ink); font-size: 14px; line-height: 1.6; }
  a { text-decoration: none; color: inherit; }
  button { font-family: var(--font-body); cursor: pointer; }
  textarea, input { font-family: var(--font-body); }

  /* Nav */
  .nav { background: var(--paper); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200; }
  .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 32px; height: 56px; display: flex; align-items: center; }
  .nav-logo { font-family: var(--font-display); font-size: 18px; font-weight: 600; letter-spacing: 2px; margin-right: 36px; white-space: nowrap; }
  .nav-logo em { color: var(--red); font-style: normal; }
  .nav-links { display: flex; gap: 2px; flex: 1; }
  .nav-links a { font-size: 13px; color: var(--muted); padding: 5px 11px; border-radius: 6px; transition: all .15s; }
  .nav-links a:hover { background: var(--cream); color: var(--ink); }
  .nav-links a.active { background: var(--cream); color: var(--ink); font-weight: 500; }
  .nav-auth { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .btn-sm { font-size: 13px; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-strong); background: transparent; color: var(--muted); transition: all .15s; }
  .btn-sm:hover { background: var(--cream); color: var(--ink); }
  .btn-sm.primary { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .btn-sm.primary:hover { opacity: .85; }
  .user-chip { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .user-chip strong { color: var(--ink); font-weight: 500; }

  /* Page header */
  .page-header { background: var(--ink); padding: 32px 32px 28px; }
  .page-header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; }
  .page-header h1 { font-family: var(--font-display); font-size: 34px; font-weight: 400; letter-spacing: 2px; color: var(--cream); }
  .page-header p { font-size: 12px; color: rgba(245,242,236,0.4); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 6px; }
  .btn-write { font-size: 13px; padding: 9px 20px; border-radius: 8px; border: none; background: var(--red); color: #fff; font-weight: 500; transition: opacity .15s; display: flex; align-items: center; gap: 6px; }
  .btn-write:hover { opacity: .85; }

  /* Layout */
  .page-body { max-width: 1100px; margin: 0 auto; padding: 24px 32px; display: grid; grid-template-columns: 1fr 260px; gap: 24px; align-items: start; }

  /* Post list */
  .post-table { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .post-table-header { display: grid; grid-template-columns: 1fr 80px 60px 60px; gap: 12px; padding: 10px 20px; background: var(--faint); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .post-row { display: grid; grid-template-columns: 1fr 80px 60px 60px; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .12s; align-items: center; }
  .post-row:last-child { border-bottom: none; }
  .post-row:hover { background: var(--cream); }
  .post-row:hover .post-title { color: var(--red); }
  .post-title { font-size: 14px; font-weight: 500; transition: color .12s; display: flex; align-items: center; gap: 6px; }
  .post-title-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .new-badge { font-size: 9px; padding: 2px 5px; background: var(--red-bg); color: var(--red); border-radius: 3px; font-weight: 600; flex-shrink: 0; }
  .post-author { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .post-stat { font-size: 12px; color: var(--muted); text-align: center; display: flex; align-items: center; justify-content: center; gap: 3px; }
  .empty-board { padding: 60px 20px; text-align: center; color: var(--muted); }
  .empty-board svg { opacity: .2; margin-bottom: 12px; }
  .empty-board p { font-size: 13px; }

  /* Pagination */
  .pagination { display: flex; justify-content: center; gap: 4px; margin-top: 16px; }
  .page-btn { font-size: 13px; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--paper); color: var(--muted); cursor: pointer; transition: all .15s; }
  .page-btn:hover, .page-btn.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .page-btn:disabled { opacity: .35; cursor: default; }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: 16px; }
  .widget { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .widget-title { font-size: 13px; font-weight: 500; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; color: var(--ink); }
  .widget-title svg { opacity: .45; }
  .popular-list { display: flex; flex-direction: column; gap: 2px; }
  .popular-item { padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .popular-item:last-child { border-bottom: none; }
  .popular-item:hover { color: var(--red); }
  .popular-meta { font-size: 11px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }

  /* ── Single post view ── */
  #view-post { display: none; }
  .post-detail { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .post-detail-header { padding: 24px 28px; border-bottom: 1px solid var(--border); }
  .post-detail-title { font-family: var(--font-display); font-size: 26px; font-weight: 500; letter-spacing: .5px; line-height: 1.3; }
  .post-detail-meta { display: flex; align-items: center; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--muted); }
  .post-detail-body { padding: 28px; font-size: 14px; line-height: 1.9; min-height: 160px; white-space: pre-wrap; word-break: keep-all; border-bottom: 1px solid var(--border); }
  .post-actions { padding: 16px 28px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border); }
  .like-btn { display: flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border-strong); background: transparent; color: var(--muted); font-size: 13px; transition: all .15s; }
  .like-btn:hover, .like-btn.liked { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .back-btn { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 4px; padding: 8px 0; background: none; border: none; transition: color .15s; margin-left: auto; }
  .back-btn:hover { color: var(--ink); }
  .post-owner-actions { display: flex; gap: 6px; }
  .danger-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #E8C4BE; background: var(--red-bg); color: var(--red); transition: all .15s; }
  .danger-btn:hover { background: var(--red); color: #fff; }

  /* Comments */
  .comments-wrap { padding: 24px 28px; }
  .comments-title { font-size: 13px; font-weight: 500; margin-bottom: 16px; color: var(--muted); letter-spacing: .5px; }
  .comment-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
  .comment-item:last-of-type { border-bottom: none; }
  .comment-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .comment-author { font-size: 12px; font-weight: 500; }
  .comment-date { font-size: 11px; color: var(--muted); }
  .comment-body { font-size: 13px; line-height: 1.7; color: #3a3835; }
  .comment-del { font-size: 11px; color: var(--muted); background: none; border: none; padding: 2px 6px; transition: color .15s; }
  .comment-del:hover { color: var(--red); }
  .comment-form { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
  .comment-form textarea { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 8px; font-size: 13px; resize: vertical; min-height: 80px; background: var(--cream); color: var(--ink); outline: none; transition: border-color .15s; }
  .comment-form textarea:focus { border-color: var(--ink); }
  .comment-form-footer { display: flex; justify-content: flex-end; }
  .submit-btn { padding: 8px 20px; background: var(--ink); color: var(--cream); border: none; border-radius: 6px; font-size: 13px; font-weight: 500; transition: opacity .15s; }
  .submit-btn:hover { opacity: .85; }

  /* ── Write / Edit view ── */
  #view-write { display: none; }
  .write-form { background: var(--paper); border: 1px solid var(--border); border-radius: 12px; padding: 28px; }
  .write-form h2 { font-family: var(--font-display); font-size: 22px; font-weight: 500; letter-spacing: 1px; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .form-group label { font-size: 12px; font-weight: 500; color: var(--muted); letter-spacing: .5px; }
  .form-group input, .form-group textarea {
    padding: 11px 14px; border: 1px solid var(--border-strong); border-radius: 8px;
    font-size: 14px; color: var(--ink); background: var(--cream); outline: none; transition: border-color .15s;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--ink); }
  .form-group textarea { min-height: 280px; resize: vertical; line-height: 1.8; }
  .write-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; }
  .cancel-btn { padding: 9px 20px; border: 1px solid var(--border-strong); border-radius: 6px; background: transparent; color: var(--muted); font-size: 13px; transition: all .15s; }
  .cancel-btn:hover { background: var(--faint); color: var(--ink); }

  /* ── Auth modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(28,26,23,0.5); z-index: 500; display: none; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--paper); border-radius: 14px; padding: 32px; width: 380px; position: relative; }
  .modal h2 { font-family: var(--font-display); font-size: 24px; font-weight: 500; letter-spacing: 1px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
  .modal-close { position: absolute; top: 16px; right: 18px; background: none; border: none; font-size: 20px; color: var(--muted); line-height: 1; }
  .modal-close:hover { color: var(--ink); }
  .modal .form-group input { background: var(--cream); }
  .modal-submit { width: 100%; padding: 11px; background: var(--ink); color: var(--cream); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; margin-top: 8px; transition: opacity .15s; }
  .modal-submit:hover { opacity: .85; }
  .modal-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
  .modal-switch a { color: var(--ink); font-weight: 500; cursor: pointer; }
  .error-msg { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }
  .error-msg.show { display: block; }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--ink); color: var(--cream); font-size: 13px; padding: 10px 20px; border-radius: 8px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* Loading */
  .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
</style>
</head>

<script>
/* ─── Supabase 초기화 ─── */
const SUPABASE_URL = 'https://ldqpimpauuqgxrqteswy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AtP1YZ-SG-VJ8dSYQnOHww_1z3cZxrw';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ─── 상태 ─── */
let currentUser = null;
let currentProfile = null;
let currentPost = null;
let currentPage = 1;
let editingPostId = null;
let isLoginMode = true;
const PAGE_SIZE = 20;

/* ─── 유틸 ─── */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(d) {
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60)     return '방금 전';
  if (diff < 3600)   return Math.floor(diff/60) + '분 전';
  if (diff < 86400)  return Math.floor(diff/3600) + '시간 전';
  if (diff < 604800) return Math.floor(diff/86400) + '일 전';
  return new Date(d).toLocaleDateString('ko-KR');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function showView(name) {
  ['list','post','write'].forEach(v => {
    document.getElementById('view-' + v).style.display = v === name ? '' : 'none';
  });
  window.scrollTo({ top: 56, behavior: 'smooth' });
}

/* ─── 인증 ─── */
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await setUser(session.user);

  sb.auth.onAuthStateChange(async (event, session) => {
    if (session) await setUser(session.user);
    else clearUser();
  });
}

async function setUser(user) {
  currentUser = user;
  const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = data;
  renderNavAuth();
}

function clearUser() {
  currentUser = null;
  currentProfile = null;
  renderNavAuth();
}

function renderNavAuth() {
  const el = document.getElementById('nav-auth');
  if (currentProfile) {
    el.innerHTML = `
      <span class="user-chip"><strong>${escHtml(currentProfile.username)}</strong> 님</span>
      <button class="btn-sm" onclick="logout()">로그아웃</button>`;
  } else {
    el.innerHTML = `
      <button class="btn-sm" onclick="showAuth('login')">로그인</button>
      <button class="btn-sm primary" onclick="showAuth('signup')">회원가입</button>`;
  }
}

async function logout() {
  await sb.auth.signOut();
  showToast('로그아웃 됐어요');
}

/* ─── Auth Modal ─── */
function showAuth(mode) {
  isLoginMode = mode === 'login';
  updateAuthModal();
  document.getElementById('auth-modal').classList.add('show');
  setTimeout(() => document.getElementById('input-email').focus(), 100);
}
function closeAuth() {
  document.getElementById('auth-modal').classList.remove('show');
  document.getElementById('auth-error').classList.remove('show');
}
function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  updateAuthModal();
}
function updateAuthModal() {
  document.getElementById('modal-title').textContent     = isLoginMode ? '로그인' : '회원가입';
  document.getElementById('modal-desc').textContent      = isLoginMode ? '펜싱 커뮤니티에 오신 걸 환영해요' : '새 계정을 만들어보세요';
  document.getElementById('modal-submit-btn').textContent = isLoginMode ? '로그인' : '가입하기';
  document.getElementById('username-group').style.display = isLoginMode ? 'none' : '';
  document.getElementById('modal-switch').innerHTML      = isLoginMode
    ? '계정이 없으신가요? <a onclick="toggleAuthMode()">회원가입</a>'
    : '이미 계정이 있으신가요? <a onclick="toggleAuthMode()">로그인</a>';
  document.getElementById('auth-error').classList.remove('show');
}

async function submitAuth() {
  const email    = document.getElementById('input-email').value.trim();
  const password = document.getElementById('input-password').value;
  const username = document.getElementById('input-username').value.trim();
  const errEl    = document.getElementById('auth-error');
  const btn      = document.getElementById('modal-submit-btn');

  if (!email || !password) { showErr('이메일과 비밀번호를 입력해주세요'); return; }

  // 버튼 로딩 상태
  btn.disabled = true;
  btn.textContent = isLoginMode ? '로그인 중...' : '가입 처리 중...';
  errEl.classList.remove('show');

  if (isLoginMode) {
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showErr('이메일 또는 비밀번호가 올바르지 않아요');
      btn.disabled = false; btn.textContent = '로그인';
      return;
    }
    closeAuth();
    showToast('✅ 로그인 됐어요!');
    loadPosts();
  } else {
    if (!username) { showErr('닉네임을 입력해주세요'); btn.disabled = false; btn.textContent = '가입하기'; return; }
    if (username.length < 2) { showErr('닉네임은 2자 이상이어야 해요'); btn.disabled = false; btn.textContent = '가입하기'; return; }
    const { data, error } = await sb.auth.signUp({
      email, password,
      options: { data: { username } }
    });

    const isRateLimit = error?.message === 'email rate limit exceeded';

    if (error && !isRateLimit) {
      const msg = {
        'User already registered': '이미 가입된 이메일이에요',
        'Password should be at least 6 characters': '비밀번호는 6자 이상이어야 해요',
        'Unable to validate email address: invalid format': '이메일 형식이 올바르지 않아요',
      }[error.message] || '가입 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
      showErr(msg);
      btn.disabled = false; btn.textContent = '가입하기';
      return;
    }

    // 성공 (또는 rate limit — 계정은 생성됨)
    const isAutoLogin = data?.session != null;
    const modal = document.querySelector('#auth-modal .modal');
    modal.innerHTML = `
      <div style="padding:40px 32px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">${isAutoLogin ? '🎉' : '📧'}</div>
        <h2 style="font-family:var(--font-display);font-size:22px;font-weight:500;letter-spacing:1px;margin-bottom:10px">
          ${isAutoLogin ? '가입 완료!' : '가입 신청 완료!'}
        </h2>
        <p style="font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:24px">
          ${isAutoLogin
            ? `<strong style="color:var(--ink)">${escHtml(username)}</strong> 님, 환영해요 🤺<br>지금 바로 이용하실 수 있어요.`
            : `<strong style="color:var(--ink)">${escHtml(email)}</strong>로<br>인증 메일을 보냈어요.<br>메일함을 확인해주세요.`
          }
          ${isRateLimit ? `<br><span style="font-size:12px;color:#B08000">메일이 도착하지 않으면 잠시 후 다시 시도해주세요</span>` : ''}
        </p>
        <button onclick="closeAuth()" style="width:100%;padding:11px;background:var(--ink);color:var(--cream);border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-body)">
          ${isAutoLogin ? '시작하기' : '확인'}
        </button>
      </div>`;
    if (isAutoLogin) {
      setTimeout(() => { closeAuth(); loadPosts(); }, 1800);
    }
  }

  function showErr(msg) {
    errEl.textContent = msg;
    errEl.classList.add('show');
  }
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ─── 게시글 목록 ─── */
async function loadPosts() {
  const body = document.getElementById('post-list-body');
  body.innerHTML = '<div class="loading">로딩 중...</div>';

  const from = (currentPage - 1) * PAGE_SIZE;
  const to   = from + PAGE_SIZE - 1;

  try {
    const { data: posts, error, count } = await sb
      .from('posts')
      .select('id, title, content, created_at, views, likes, author_id', { count: 'exact' })
      .order('created_at', { ascending: false })
      .range(from, to);

    if (error) throw error;
    if (!posts || posts.length === 0) {
      body.innerHTML = `<div class="empty-board">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/></svg>
        <p>아직 게시글이 없어요.<br>첫 번째 글을 작성해보세요!</p>
      </div>`;
      return;
    }

    // 작성자 username 별도 조회
    const authorIds = [...new Set(posts.map(p => p.author_id))];
    const { data: profiles } = await sb.from('profiles').select('id, username').in('id', authorIds);
    const profileMap = {};
    (profiles || []).forEach(p => { profileMap[p.id] = p.username; });

    // 댓글 수 별도 조회
    const postIds = posts.map(p => p.id);
    const { data: commentCounts } = await sb.from('comments').select('post_id').in('post_id', postIds);
    const countMap = {};
    (commentCounts || []).forEach(c => { countMap[c.post_id] = (countMap[c.post_id] || 0) + 1; });

    const isNew = d => (Date.now() - new Date(d)) < 86400000;

    body.innerHTML = posts.map(p => `
      <div class="post-row" onclick="loadPost(${p.id})">
        <div class="post-title">
          <span class="post-title-text">${escHtml(p.title)}</span>
          ${isNew(p.created_at) ? '<span class="new-badge">NEW</span>' : ''}
        </div>
        <div class="post-author">${escHtml(profileMap[p.author_id] || '알수없음')}</div>
        <div class="post-stat">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          ${p.views || 0}
        </div>
        <div class="post-stat">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${countMap[p.id] || 0}
        </div>
      </div>`).join('');

    renderPagination(count);
    loadPopular();

  } catch(e) {
    console.error('게시판 오류:', e);
    body.innerHTML = `<div class="loading">오류가 발생했어요 (${e.message || '알 수 없는 오류'})</div>`;
  }
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let p = 1; p <= totalPages; p++) {
    if (p===1||p===totalPages||Math.abs(p-currentPage)<=2)
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    else if (Math.abs(p-currentPage)===3)
      html += `<span style="padding:6px 4px;color:var(--muted)">…</span>`;
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>→</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  loadPosts();
  window.scrollTo({ top: 56 });
}

/* ─── 인기글 ─── */
async function loadPopular() {
  const { data } = await sb.from('posts')
    .select('id, title, likes, views')
    .order('likes', { ascending: false })
    .limit(5);
  if (!data) return;
  const html = data.map(p => `
    <div class="popular-item" onclick="loadPost(${p.id})">
      ${escHtml(p.title)}
      <div class="popular-meta">
        <span>좋아요 ${p.likes||0}</span>
        <span>조회 ${p.views||0}</span>
      </div>
    </div>`).join('');
  ['popular-list','popular-list-2'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = html || '<div style="font-size:13px;color:var(--muted);padding:8px 0">아직 게시글이 없어요</div>';
  });
}

/* ─── 글 상세 ─── */
async function loadPost(id) {
  showView('post');
  await sb.rpc('increment_views', { post_id: id });

  const { data: post } = await sb.from('posts')
    .select('*')
    .eq('id', id)
    .single();

  if (!post) { showToast('글을 불러오지 못했어요'); goList(); return; }

  // 작성자 username 조회
  const { data: author } = await sb.from('profiles').select('username').eq('id', post.author_id).single();
  post._username = author?.username || '알수없음';
  currentPost = post;

  document.getElementById('detail-title').textContent  = post.title;
  document.getElementById('detail-body').textContent   = post.content;
  document.getElementById('detail-author').textContent = post._username;
  document.getElementById('detail-date').textContent   = timeAgo(post.created_at);
  document.getElementById('detail-views').textContent  = `조회 ${post.views || 0}`;
  document.getElementById('like-count').textContent    = post.likes || 0;

  // 내 글이면 수정/삭제 버튼
  const ownerEl = document.getElementById('owner-actions');
  ownerEl.style.display = (currentUser && currentUser.id === post.author_id) ? 'flex' : 'none';

  // 좋아요 여부
  if (currentUser) {
    const { data: liked } = await sb.from('likes')
      .select('user_id').eq('user_id', currentUser.id).eq('post_id', id).maybeSingle();
    document.getElementById('like-btn').classList.toggle('liked', !!liked);
  }

  // 댓글
  const commentForm = document.getElementById('comment-form');
  const commentNotice = document.getElementById('comment-login-notice');
  if (currentUser) { commentForm.style.display=''; commentNotice.style.display='none'; }
  else             { commentForm.style.display='none'; commentNotice.style.display=''; }

  loadComments(id);
  loadPopular();
}

async function loadComments(postId) {
  const { data: comments } = await sb.from('comments')
    .select('id, content, created_at, author_id')
    .eq('post_id', postId)
    .order('created_at', { ascending: true });

  // 작성자 username 일괄 조회
  const authorIds = [...new Set((comments||[]).map(c => c.author_id))];
  const profileMap = {};
  if (authorIds.length) {
    const { data: profiles } = await sb.from('profiles').select('id, username').in('id', authorIds);
    (profiles||[]).forEach(p => { profileMap[p.id] = p.username; });
  }

  document.getElementById('comments-title').textContent = `댓글 ${comments?.length || 0}`;
  document.getElementById('comment-list').innerHTML = (comments||[]).map(c => `
    <div class="comment-item" id="c-${c.id}">
      <div class="comment-header">
        <span class="comment-author">${escHtml(profileMap[c.author_id] || '알수없음')}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="comment-date">${timeAgo(c.created_at)}</span>
          ${currentUser?.id === c.author_id ? `<button class="comment-del" onclick="deleteComment(${c.id})">삭제</button>` : ''}
        </span>
      </div>
      <div class="comment-body">${escHtml(c.content)}</div>
    </div>`).join('') || '<div style="font-size:13px;color:var(--muted);padding:8px 0">첫 댓글을 달아보세요!</div>';
}

async function submitComment() {
  if (!currentUser) { showAuth('login'); return; }
  const content = document.getElementById('comment-input').value.trim();
  if (!content) return;
  const { error } = await sb.from('comments').insert({
    post_id: currentPost.id,
    author_id: currentUser.id,
    content,
  });
  if (error) { showToast('댓글 등록 실패'); return; }
  document.getElementById('comment-input').value = '';
  loadComments(currentPost.id);
  showToast('댓글이 등록됐어요!');
}

async function deleteComment(id) {
  if (!confirm('댓글을 삭제할까요?')) return;
  await sb.from('comments').delete().eq('id', id);
  loadComments(currentPost.id);
}

async function toggleLike() {
  if (!currentUser) { showAuth('login'); return; }
  const btn = document.getElementById('like-btn');
  const isLiked = btn.classList.contains('liked');
  const postId = currentPost.id;

  if (isLiked) {
    await sb.from('likes').delete().eq('user_id', currentUser.id).eq('post_id', postId);
    await sb.from('posts').update({ likes: (currentPost.likes||1) - 1 }).eq('id', postId);
    currentPost.likes = (currentPost.likes||1) - 1;
  } else {
    await sb.from('likes').insert({ user_id: currentUser.id, post_id: postId });
    await sb.from('posts').update({ likes: (currentPost.likes||0) + 1 }).eq('id', postId);
    currentPost.likes = (currentPost.likes||0) + 1;
  }
  btn.classList.toggle('liked');
  document.getElementById('like-count').textContent = currentPost.likes;
}

/* ─── 글쓰기 / 수정 ─── */
function goWrite() {
  if (!currentUser) {
    showAuth('login');
    return;
  }
  editingPostId = null;
  document.getElementById('write-title').textContent = '새 글 작성';
  document.getElementById('input-title').value = '';
  document.getElementById('input-body').value = '';
  showView('write');
  window.scrollTo({ top: 0 });
}

function editPost() {
  editingPostId = currentPost.id;
  document.getElementById('write-title').textContent = '글 수정';
  document.getElementById('input-title').value = currentPost.title;
  document.getElementById('input-body').value = currentPost.content;
  showView('write');
}

async function submitPost() {
  if (!currentUser) { showAuth('login'); return; }
  const title   = document.getElementById('input-title').value.trim();
  const content = document.getElementById('input-body').value.trim();
  if (!title)   { showToast('제목을 입력해주세요'); return; }
  if (!content) { showToast('내용을 입력해주세요'); return; }

  if (editingPostId) {
    const { error } = await sb.from('posts')
      .update({ title, content, updated_at: new Date().toISOString() })
      .eq('id', editingPostId);
    if (error) { showToast('수정 실패'); return; }
    showToast('수정됐어요!');
    loadPost(editingPostId);
  } else {
    const { data, error } = await sb.from('posts')
      .insert({ title, content, author_id: currentUser.id })
      .select().single();
    if (error) { showToast('등록 실패'); return; }
    showToast('글이 등록됐어요!');
    currentPage = 1;
    goList();
  }
}

async function deletePost() {
  if (!confirm('정말 삭제할까요?')) return;
  await sb.from('posts').delete().eq('id', currentPost.id);
  showToast('삭제됐어요');
  goList();
}

/* ─── 네비게이션 ─── */
function goList() {
  showView('list');
  loadPosts();
}

/* ─── 초기화 ─── */
async function init() {
  await initAuth();
  showView('list');
  loadPosts();

  // URL hash로 특정 글 바로 열기
  const hash = location.hash.match(/^#post-(\d+)$/);
  if (hash) loadPost(parseInt(hash[1]));
}

init();
</script>
</body>
</html>
